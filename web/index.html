<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CORTEX</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --panel: #121212;
      --panel-soft: #1d1d1d;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8f8f8;
      --muted: #c0c0c0;
      --accent: #f5f5f5;
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #000000 0%, #121212 100%);
      color: var(--text);
      overflow-x: hidden;
    }
    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      max-width: 1600px;
      margin: 18px auto;
      padding: 0 18px 18px;
    }
    .panel, .content {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
    }
    .panel {
      display: grid;
      gap: 18px;
      padding: 22px;
      min-height: calc(100vh - 54px);
      position: sticky;
      top: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-logo {
      width: 88px;
      height: auto;
      border-radius: 20px;
      display: block;
      background: #000;
      object-fit: contain;
      box-shadow: 0 12px 30px rgba(255, 255, 255, 0.08);
    }
    .brand-title h1 { margin: 0; font-size: 1.5rem; }
    .brand-title p { margin: 6px 0 0; color: var(--muted); font-size: 0.95rem; line-height: 1.4; }
    .section-title { margin: 0; color: var(--muted); font-size: 0.92rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .button, .chip {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 12px 16px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      font-weight: 700;
    }
    .button:hover, .chip:hover { transform: translateY(-1px); background: rgba(255, 255, 255, 0.14); }
    .button.secondary { background: rgba(255, 255, 255, 0.08); }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { width: 100%; border: 1px solid var(--border); border-radius: 18px; background: rgba(15, 23, 42, 0.95); color: var(--text); padding: 16px; font-size: 1rem; outline: none; }
    textarea.field { min-height: 140px; resize: vertical; }
    .chat-header,
    .chat-footer,
    .chat-box { display: grid; gap: 16px; }
    .chat-window { min-height: 540px; padding: 22px; display: grid; gap: 18px; }
    .messages { display: grid; gap: 14px; overflow-y: auto; max-height: 520px; padding-right: 4px; }
    .message { border-radius: 24px; padding: 18px 20px; line-height: 1.7; white-space: pre-wrap; }
    .message.user { justify-self: end; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.12); }
    .message.assistant { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.10); }
    .message strong { display: block; margin-bottom: 8px; }
    .settings-group { display: grid; gap: 12px; }
    .toggle-row { display: flex; align-items: center; gap: 10px; }
    .file-preview { width: 100%; border-radius: 18px; max-height: 220px; object-fit: contain; border: 1px solid var(--border); display: none; }
    .status { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.95rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888888; }
    .status-dot.online { background: #ffffff; }
    .status-dot.offline { background: #555555; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 10px; }
    @media (max-width: 1120px) { .layout { grid-template-columns: 1fr; } .panel { position: relative; top: 0; min-height: auto; } }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <div class="brand">
        <img class="brand-logo" src="logo.svg" alt="CORTEX logo" />
        <div class="brand-title">
          <h1>CORTEX</h1>
          <p>AI chat assistant with slide tools, file reading, and richer response structure.</p>
        </div>
      </div>
      <div>
        <p class="section-title">Quick actions</p>
        <div class="chip-list" id="quickChips"></div>
      </div>
      <div>
        <p class="section-title">Settings</p>
        <div class="settings-group">
          <label>Backend endpoint <input id="backendUrl" class="field" type="text" placeholder="https://your-backend.example.com" /></label>
          <label class="toggle-row"><input id="ttsEnabled" type="checkbox" /> Enable text-to-speech</label>
          <label class="toggle-row"><input id="autoSpeak" type="checkbox" /> Auto-speak responses</label>
          <button id="saveSettings" class="button">Save settings</button>
          <button id="resetSettings" class="button secondary">Reset defaults</button>
        </div>
      </div>
      <div>
        <p class="section-title">Uploads</p>
        <div class="settings-group">
          <label>Upload PDF <input id="pdfInput" class="field" type="file" accept="application/pdf" /></label>
          <p id="pdfInfo" style="color: var(--muted); margin:0; font-size:0.95rem;">PDF text is extracted into your message.</p>
          <label>Upload image <input id="imageInput" class="field" type="file" accept="image/*" /></label>
          <img id="imagePreview" class="file-preview" alt="Image preview" />
          <p id="imageInfo" style="color: var(--muted); margin:0; font-size:0.95rem;">Preview your image and ask about it.</p>
        </div>
      </div>
      <div>
        <p class="section-title">Feedback</p>
        <div class="settings-group">
          <textarea id="feedbackText" class="field" placeholder="Tell us what should improve"></textarea>
          <button id="sendFeedback" class="button">Send feedback</button>
          <p id="feedbackResult" style="color: var(--muted); margin:0; font-size:0.95rem;"></p>
        </div>
      </div>
    </aside>
    <main class="content">
      <div class="chat-window">
        <div class="chat-header">
          <div>
            <h1 style="margin:0;">Chat</h1>
            <p style="margin:4px 0 0; color: var(--muted);">Ask Cortex anything and get structured, verified answers.</p>
          </div>
          <div class="controls">
            <button id="togglePanel" class="button secondary">Toggle tools</button>
          </div>
        </div>
        <div class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">Checking backend...</span><span id="statusLast"></span></div>
        <div id="messageList" class="messages"></div>
        <div class="chat-footer">
          <textarea id="query" class="field" placeholder="Type your question here..."></textarea>
          <div class="controls">
            <button id="send" class="button">Send</button>
            <button id="clear" class="button secondary">Clear</button>
            <button id="speak" class="button secondary">Speak</button>
            <button id="copy" class="button secondary">Copy</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.226/pdf.min.js"></script>
  <script>
    const DEFAULT_BACKEND_URL = window.location.protocol.startsWith('http') && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' ? window.location.origin : 'http://127.0.0.1:8080';
    const BACKEND_URL_KEY = 'cortex_v_backend_url';
    const FONT_SIZE_KEY = 'cortex_v_font_size';
    const TTS_ENABLED_KEY = 'cortex_v_tts_enabled';
    const AUTO_SPEAK_KEY = 'cortex_v_auto_speak';
    const queryInput = document.getElementById('query');
    const messageList = document.getElementById('messageList');
    const sendButton = document.getElementById('send');
    const clearButton = document.getElementById('clear');
    const speakButton = document.getElementById('speak');
    const copyButton = document.getElementById('copy');
    const togglePanel = document.getElementById('togglePanel');
    const slidePanel = document.querySelector('.panel');
    const backendInput = document.getElementById('backendUrl');
    const saveSettingsButton = document.getElementById('saveSettings');
    const resetSettingsButton = document.getElementById('resetSettings');
    const ttsEnabledCheckbox = document.getElementById('ttsEnabled');
    const autoSpeakCheckbox = document.getElementById('autoSpeak');
    const pdfInput = document.getElementById('pdfInput');
    const pdfInfo = document.getElementById('pdfInfo');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const imageInfo = document.getElementById('imageInfo');
    const feedbackText = document.getElementById('feedbackText');
    const sendFeedbackButton = document.getElementById('sendFeedback');
    const feedbackResult = document.getElementById('feedbackResult');
    const quickChips = document.getElementById('quickChips');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusLast = document.getElementById('statusLast');
    const examples = ['brainstorm app ideas', 'explain torque', 'summarize a PDF', 'image description', 'compare batteries'];
    const getBackendUrl = () => localStorage.getItem(BACKEND_URL_KEY) || DEFAULT_BACKEND_URL;
    const getAskUrl = () => `${getBackendUrl()}/api/ask`;
    const getFeedbackUrl = () => `${getBackendUrl()}/api/feedback`;
    const fetchWithTimeout = async (url, options = {}, timeout = 7000) => {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    };
    const setStatus = (online, message = '') => {
      statusDot.classList.toggle('online', online);
      statusDot.classList.toggle('offline', !online);
      statusText.textContent = online ? 'Backend connected' : 'Backend offline';
      statusLast.textContent = message ? `(${message}) ${new Date().toLocaleTimeString()}` : `Last checked: ${new Date().toLocaleTimeString()}`;
    };
    const addMessage = (role, text) => {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.innerHTML = `<strong>${role === 'user' ? 'You' : 'CORTEX'}</strong>${text}`;
      messageList.appendChild(el);
      messageList.scrollTop = messageList.scrollHeight;
    };
    const speakResponse = () => {
      if (!ttsEnabledCheckbox.checked || !window.speechSynthesis) return;
      const last = Array.from(messageList.querySelectorAll('.message.assistant')).pop();
      if (!last) return;
      const utterance = new SpeechSynthesisUtterance(last.textContent.replace('CORTEX', '').trim());
      window.speechSynthesis.speak(utterance);
    };
    const copyResponse = () => {
      const last = Array.from(messageList.querySelectorAll('.message.assistant')).pop();
      if (!last) return;
      navigator.clipboard.writeText(last.textContent.replace('CORTEX', '').trim()).then(() => {
        feedbackResult.textContent = 'Reply copied to clipboard.';
      });
    };
    const loadSettings = () => {
      backendInput.value = localStorage.getItem(BACKEND_URL_KEY) || DEFAULT_BACKEND_URL;
      ttsEnabledCheckbox.checked = localStorage.getItem(TTS_ENABLED_KEY) === '1';
      autoSpeakCheckbox.checked = localStorage.getItem(AUTO_SPEAK_KEY) === '1';
    };
    const saveSettings = () => {
      localStorage.setItem(BACKEND_URL_KEY, backendInput.value.trim() || DEFAULT_BACKEND_URL);
      localStorage.setItem(TTS_ENABLED_KEY, ttsEnabledCheckbox.checked ? '1' : '0');
      localStorage.setItem(AUTO_SPEAK_KEY, autoSpeakCheckbox.checked ? '1' : '0');
      feedbackResult.textContent = 'Settings saved.';
      checkBackend();
    };
    const resetSettings = () => {
      localStorage.removeItem(BACKEND_URL_KEY);
      localStorage.removeItem(TTS_ENABLED_KEY);
      localStorage.removeItem(AUTO_SPEAK_KEY);
      loadSettings();
      feedbackResult.textContent = 'Settings reset.';
      checkBackend();
    };
    const sendQuery = async () => {
      const query = queryInput.value.trim();
      if (!query) return;
      addMessage('user', query);
      queryInput.value = '';
      addMessage('assistant', 'Processing your request...');
      try {
        const res = await fetch(getAskUrl(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });
        const data = await res.json();
        const assistant = Array.from(messageList.querySelectorAll('.message.assistant')).pop();
        if (assistant) assistant.innerHTML = `<strong>CORTEX</strong>${data.response || 'No response.'}`;
        if (autoSpeakCheckbox.checked) speakResponse();
      } catch (err) {
        const assistant = Array.from(messageList.querySelectorAll('.message.assistant')).pop();
        if (assistant) assistant.innerHTML = `<strong>CORTEX</strong>Error: ${err.message}`;
      }
    };
    const handlePdf = async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      pdfInfo.textContent = `Loading ${file.name}...`;
      const data = await file.arrayBuffer();
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.226/pdf.worker.min.js';
      const pdf = await pdfjsLib.getDocument({ data }).promise;
      let text = '';
      for (let i = 1; i <= Math.min(2, pdf.numPages); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '

';
      }
      queryInput.value += `
[PDF ${file.name}]
${text.trim()}`;
      pdfInfo.textContent = `PDF text loaded into the prompt.`;
    };
    const handleImage = (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        imagePreview.src = reader.result;
        imagePreview.style.display = 'block';
        imageInfo.textContent = `Uploaded ${file.name}. Ask about the image above.`;
        queryInput.value += `
[Image ${file.name}]`;
      };
      reader.readAsDataURL(file);
    };
    const sendFeedback = async () => {
      const message = feedbackText.value.trim();
      if (!message) return feedbackResult.textContent = 'Enter feedback first.';
      feedbackResult.textContent = 'Sending feedback...';
      try {
        const res = await fetch(getFeedbackUrl(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, email: 'anonymous@cortex.local' }),
        });
        const data = await res.json();
        feedbackResult.textContent = data?.success ? 'Feedback sent.' : 'Feedback failed.';
        feedbackText.value = '';
      } catch (error) {
        feedbackResult.textContent = `Error sending feedback: ${error.message}`;
      }
    };
    const checkBackend = async () => {
      statusText.textContent = 'Checking backend...';
      try {
        const res = await fetchWithTimeout(`${getBackendUrl()}/api/status`, {}, 7000);
        if (res.ok) {
          const data = await res.json().catch(() => null);
          setStatus(true, data?.message || 'reachable');
        } else {
          setStatus(false, `HTTP ${res.status}`);
        }
      } catch (err) {
        const reason = err.name === 'AbortError' ? 'timeout' : err.message;
        setStatus(false, reason || 'unreachable');
      }
    };
    const buildChips = () => {
      examples.forEach(example => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.textContent = example;
        chip.addEventListener('click', () => { queryInput.value = example; queryInput.focus(); });
        quickChips.appendChild(chip);
      });
    };
    sendButton.addEventListener('click', sendQuery);
    clearButton.addEventListener('click', () => { queryInput.value = ''; });
    speakButton.addEventListener('click', speakResponse);
    copyButton.addEventListener('click', copyResponse);
    togglePanel.addEventListener('click', () => slidePanel.classList.toggle('closed'));
    saveSettingsButton.addEventListener('click', saveSettings);
    resetSettingsButton.addEventListener('click', resetSettings);
    pdfInput.addEventListener('change', handlePdf);
    imageInput.addEventListener('change', handleImage);
    sendFeedbackButton.addEventListener('click', sendFeedback);
    queryInput.addEventListener('keydown', (event) => { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendQuery(); } });
    loadSettings();
    buildChips();
    checkBackend();
    setInterval(checkBackend, 15000);
  </script>
</body>
</html>
